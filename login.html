<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingresar · {{ marca.nombre }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --azul:{{ marca.primario }}; --azul-osc:{{ marca.primario_oscuro }};
    --dark:#0F2A3F; --red:#E4002B; --gris:#5E7688;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:linear-gradient(160deg,#EAF6FC 0%,#FFFFFF 55%,#EAF6FC 100%);padding:20px}
  .card{background:#fff;border-radius:20px;width:100%;max-width:400px;overflow:hidden;
        box-shadow:0 24px 70px rgba(6,60,94,.22)}

  /* Banner del hospital, difuminado y desvanecido hacia blanco */
  .banner{position:relative;height:150px;overflow:hidden}
  .banner img{width:100%;height:100%;object-fit:cover;object-position:center 35%;
              transform:scale(1.15);filter:blur(2.5px) saturate(1.05)}
  .banner::after{content:"";position:absolute;inset:0;
                 background:linear-gradient(180deg,rgba(0,144,220,.28) 0%,rgba(255,255,255,.15) 45%,#fff 100%)}

  .body{padding:0 34px 34px;text-align:center;position:relative}
  .logo{height:44px;width:auto;max-width:180px;margin:-30px auto 6px;display:block;position:relative;z-index:2;
         filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
  h1{font-size:21px;color:var(--dark);font-weight:800;margin-top:6px}
  .sub{font-size:12px;color:var(--azul);text-align:center;letter-spacing:2px;
       text-transform:uppercase;margin-bottom:22px;font-weight:700}

  label{font-size:12px;font-weight:700;color:var(--dark);display:block;margin:14px 0 5px;text-align:left}
  input{width:100%;padding:13px 14px;border:1.5px solid #D8E5EF;border-radius:11px;
        font-size:14px;transition:border .15s,box-shadow .15s;outline:none}
  input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,144,220,.12)}

  button{width:100%;margin-top:26px;padding:14px;border:none;border-radius:11px;
         background:linear-gradient(135deg,var(--azul) 0%,var(--azul-osc) 100%);
         color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;
         box-shadow:0 6px 18px rgba(0,144,220,.35);transition:transform .12s,box-shadow .12s}
  button:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,144,220,.45)}
  button:active{transform:translateY(0)}

  .msg{background:#FDE7EB;color:var(--red);border:1px solid #f7b8c4;border-radius:10px;
       padding:11px 12px;font-size:13px;margin-bottom:6px;text-align:center}
  .pie{margin-top:22px;font-size:11px;color:#93A9BC;text-align:center}
</style>
</head>
<body>
  <div class="card">
    {% if marca.banner %}
    <div class="banner"><img src="{{ marca.banner }}" alt="{{ marca.nombre }}"></div>
    {% endif %}

    <div class="body">
      <img class="logo" src="{{ marca.logo }}" alt="{{ marca.nombre }}">
      <h1>{{ marca.producto }}</h1>
      <div class="sub">{{ marca.nombre }}</div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}<div class="msg">{{ messages[0] }}</div>{% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <label>Correo</label>
        <input type="email" name="email" placeholder="tu.correo@starmedica.mx" required autofocus>
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" required>
        <button type="submit">Ingresar</button>
      </form>
      <div class="pie">Acceso restringido · Uso interno</div>
    </div>
  </div>
</body>
</html>
